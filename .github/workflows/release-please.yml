on:
  push:
    branches:
      - main

env:
  BUN_VERSION: "1.3.14"

name: release-please
jobs:
  release-please:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
      - name: Extract package name from package.json
        id: package
        run: echo "value=$(jq -r .name package.json)" >> "$GITHUB_OUTPUT"
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install
        run: bun install --frozen-lockfile
      - name: Show package name
        run: 'echo "version ${{ steps.package.outputs.value }}"'
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
